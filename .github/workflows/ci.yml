name: CI/CD

on:
  push:
    branches: ["main", "master", "Gameplay-y-Sistema-de-Enemigos"]
  pull_request:
    branches: ["main", "master", "Gameplay-y-Sistema-de-Enemigos"]

jobs:
  format-and-lint:
    name: Format and Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format clang-tidy cppcheck

      - name: Check Formatting
        run: |
          echo "Running clang-format check..."
          find src include -type f \( -name "*.cpp" -o -name "*.h" \) -exec clang-format --dry-run --Werror {} +

      - name: Check Linting with cppcheck
        run: |
          cppcheck --enable=all --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            -I include \
            src/ include/

  build:
    name: Build Project
    runs-on: ubuntu-latest
    env:
      VCPKG_ROOT: /usr/local/share/vcpkg

    steps:
      - uses: actions/checkout@v4

      - name: Install Raylib Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev libglfw3-dev libxxf86vm-dev

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Setup vcpkg and install dependencies
        run: |
          $VCPKG_ROOT/vcpkg integrate install
          $VCPKG_ROOT/vcpkg install

      - name: Configure CMake with compilation database
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Check Linting with clang-tidy
        run: |
          if [ -f build/compile_commands.json ]; then
            clang-tidy -p=build src/**/*.cpp
          else
            echo "Warning: compile_commands.json not found, skipping clang-tidy"
          fi

      - name: Build Project
        run: cmake --build build --config Release
