name: Release

on:
  push:
    tags:
      - "v*" # Se ejecuta al crear un tag que empiece con "v", por ejemplo "v1.0.0"

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: space-invaders-linux
            executable: space-invaders
            build_path: build/space-invaders
            archive: space-invaders-linux.tar.gz
          - os: windows-latest
            artifact_name: space-invaders-windows
            executable: space-invaders.exe
            build_path: build/Release/space-invaders.exe
            archive: space-invaders-windows.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Raylib Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev libglfw3-dev libxxf86vm-dev

      - name: Setup vcpkg and install dependencies
        shell: bash
        run: |
          $VCPKG_INSTALLATION_ROOT/vcpkg integrate install
          $VCPKG_INSTALLATION_ROOT/vcpkg install

      - name: Configure CMake
        shell: bash
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build Project
        run: cmake --build build --config Release

      - name: Package Release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p ${{ matrix.artifact_name }}
          cp ${{ matrix.build_path }} ${{ matrix.artifact_name }}/
          if [ -d "assets" ]; then cp -r assets ${{ matrix.artifact_name }}/; fi
          tar -czvf ${{ matrix.archive }} ${{ matrix.artifact_name }}

      - name: Package Release (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ${{ matrix.artifact_name }}
          Copy-Item -Path ${{ matrix.build_path }} -Destination ${{ matrix.artifact_name }}\
          if (Test-Path "assets") { Copy-Item -Path assets -Destination ${{ matrix.artifact_name }}\assets -Recurse }
          Compress-Archive -Path ${{ matrix.artifact_name }}\* -DestinationPath ${{ matrix.archive }}

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
